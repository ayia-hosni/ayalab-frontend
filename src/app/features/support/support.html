<app-topbar [showCoffeeBtn]="false"></app-topbar>

<div class="wrap">
  <div class="support-card">

    <div class="hero">
      <span class="big-cup">☕</span>
      <h1>{{ lang.t('supTitle') }}</h1>
      <p class="tagline">{{ lang.t('supTagline') }}</p>
    </div>

    <!-- Tier picker -->
    <div class="section-label">{{ lang.t('supHowMany') }}</div>
    <div class="tiers">
      @for (tier of tiers; track tier.cups) {
        <button
          class="tier-btn"
          [class.active]="selectedTier().cups === tier.cups"
          (click)="selectTier(tier)"
          type="button">
          <span class="tier-cups">{{ tier.label }}</span>
          <span class="tier-price">{{ tier.price }}</span>
        </button>
      }
    </div>

    <!-- Payment method -->
    <div class="section-label">{{ lang.t('supPayWith') }}</div>
    <div class="methods">
      @for (m of methods; track m.value) {
        <button
          class="method-btn"
          [class.active]="method() === m.value"
          (click)="selectMethod(m.value)"
          type="button">
          <span>{{ m.icon }}</span>
          <span>{{ lang.t(m.labelKey) }}</span>
        </button>
      }
    </div>

    <!-- Billing fields -->
    <div class="fields">
      <div class="field-row">
        <div class="field">
          <label>{{ lang.t('supFirstName') }}</label>
          <input [(ngModel)]="firstName" placeholder="Ahmed" />
        </div>
        <div class="field">
          <label>{{ lang.t('supLastName') }}</label>
          <input [(ngModel)]="lastName" placeholder="Hassan" />
        </div>
      </div>
      <div class="field">
        <label>{{ lang.t('supEmail') }}</label>
        <input [(ngModel)]="email" type="email" placeholder="ahmed@example.com" />
      </div>
      @if (showPhone) {
        <div class="field">
          <label>{{ lang.t('supPhone') }}</label>
          <input [(ngModel)]="phoneNumber" placeholder="01012345678" />
        </div>
      }
    </div>

    @if (error()) {
      <div class="error-box">{{ error() }}</div>
    }

    <button class="pay-btn" (click)="pay()" [disabled]="loading()">
      @if (loading()) {
        <span class="spinner"></span> {{ lang.t('supProcessing') }}
      } @else {
        {{ lang.t('supSend') }} {{ selectedTier().cups }} {{ selectedTier().cups > 1 ? lang.t('supCoffees') : lang.t('supCoffee') }} · {{ selectedTier().price }}
      }
    </button>

    <p class="secure-note">{{ lang.t('supSecureNote') }}</p>
  </div>
</div>
