<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Aya Coding Lab</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
            arabic: ['Tajawal', 'sans-serif'],
          },
          colors: {
            brand: { purple: '#8B5CF6', light: '#F5F3FF', dark: '#6D28D9' },
            appbg: '#F8F9FA'
          },
          animation: {
            'bounce-subtle': 'bounceSubtle 2s infinite',
          },
          keyframes: {
            bounceSubtle: {
              '0%, 100%': { transform: 'translateY(-25%)', animationTimingFunction: 'cubic-bezier(0.8,0,1,1)' },
              '50%': { transform: 'none', animationTimingFunction: 'cubic-bezier(0,0,0.2,1)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    .node-3d { box-shadow: inset 0 -4px 0 rgba(0,0,0,0.15); }
  </style>
</head>
<body>
  <app-root></app-root>
</body>
</html>
