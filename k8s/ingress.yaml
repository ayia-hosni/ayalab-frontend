apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ayalab-ingress
  namespace: ayalab
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ayalab-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ayalab-frontend
                port:
                  number: 80