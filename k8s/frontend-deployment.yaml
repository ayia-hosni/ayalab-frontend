apiVersion: apps/v1
kind: Deployment
metadata:
  name: pointer-lab-frontend
  namespace: pointerlab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pointer-lab-frontend
  template:
    metadata:
      labels:
        app: pointer-lab-frontend
    spec:
      containers:
        - name: pointer-lab-frontend
          image: pointer-lab-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10