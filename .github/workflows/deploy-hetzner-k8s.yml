name: Deploy Frontend to Hetzner K8s

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ayahosny/ayalab-frontend:latest
            ayahosny/ayalab-frontend:${{ github.sha }}

  deploy:
    name: Deploy to Hetzner K8s
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_HETZNER }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create namespace
        run: |
          kubectl create namespace ayalab --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply K8s manifests
        run: kubectl apply -f k8s/

      - name: Update frontend image
        run: |
          kubectl set image deployment/ayalab-frontend \
            ayalab-frontend=ayahosny/ayalab-frontend:${{ github.sha }} \
            -n ayalab

      - name: Wait for rollout
        run: kubectl rollout status deployment/ayalab-frontend -n ayalab --timeout=120s
