services:
  frontend:
    image: ayahosny/ayalab-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  backend:
    image: ayahosny/ayalab-backend:latest
    # build:
    #   context: ../aya-lab-backend
    #   dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
