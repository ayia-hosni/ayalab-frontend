# Backend runs elsewhere (http://api.ayalab.co) — nginx.conf proxies /api there directly.
# No local backend/postgres service needed in this compose file.
# TLS + routing for ayalab.co is handled by the shared reverse-proxy stack
# (see ../reverse-proxy) — this service no longer publishes port 80 itself.
services:
  frontend:
    image: ayahosny/ayalab-frontend:latest
    environment:
      VIRTUAL_HOST: ayalab.co
      VIRTUAL_PORT: "80"
      LETSENCRYPT_HOST: ayalab.co
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:?set LETSENCRYPT_EMAIL in .env}
    networks:
      - web
    restart: unless-stopped

networks:
  web:
    external: true
